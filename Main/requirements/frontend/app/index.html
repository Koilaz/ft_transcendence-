<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>AImpostor</title>
	<style>
		:root
		{
			--bg: #0f1117;
			--panel: #171a23;
			--panel-2: #1e222d;
			--border: #2a2f3d;
			--text: #e7e9ee;
			--muted: #8a90a2;
			--accent: #6c8bff;
			--green: #3ecf8e;
			--orange: #f5a623;
			--red: #ef5350;
		}

		* { box-sizing: border-box; }

		body
		{
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			background: radial-gradient(circle at top, #1a1e2a 0%, var(--bg) 60%);
			color: var(--text);
			max-width: 920px;
			margin: 1.5rem auto;
			padding: 0 1rem 2rem;
		}

		h1 { font-size: 1.3rem; margin: 0; }
		h2 { font-size: .85rem; margin: 0 0 .5rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }

		header
		{
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: .75rem;
			flex-wrap: wrap;
			margin-bottom: 1rem;
		}

		.header-left, .header-right
		{
			display: flex;
			align-items: center;
			gap: .6rem;
			flex-wrap: wrap;
		}

		.tag
		{
			font-size: .8rem;
			color: var(--muted);
			background: var(--panel);
			border: 1px solid var(--border);
			padding: .3rem .7rem;
			border-radius: 999px;
		}

		.conn
		{
			display: flex;
			align-items: center;
			gap: .5rem;
			font-size: .8rem;
			color: var(--muted);
			background: var(--panel);
			border: 1px solid var(--border);
			padding: .35rem .7rem;
			border-radius: 999px;
		}

		.dot
		{
			width: .55rem;
			height: .55rem;
			border-radius: 50%;
			background: var(--muted);
			transition: background .2s ease, box-shadow .2s ease;
		}

		.conn.open .dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
		.conn.closed .dot { background: var(--red); box-shadow: 0 0 8px var(--red); }
		.conn.connecting .dot { background: var(--orange); box-shadow: 0 0 8px var(--orange); animation: pulse 1s infinite; }

		.character-badge
		{
			background: rgba(108, 139, 255, .15);
			color: var(--accent);
			font-weight: 600;
		}

		.character-badge strong { color: var(--text); }

		/* ---- Status banner ---- */
		#status-banner
		{
			border-radius: 14px;
			padding: .9rem 1.1rem;
			margin-bottom: 1rem;
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 1rem;
			flex-wrap: wrap;
			border: 1px solid var(--border);
			background: var(--panel);
			font-size: .95rem;
			transition: background .2s ease, border-color .2s ease;
		}

		#status-banner.banner-myturn
		{
			background: rgba(62, 207, 142, .15);
			border-color: var(--green);
			color: var(--green);
			font-weight: 700;
			font-size: 1.05rem;
		}

		#status-banner.banner-voting
		{
			background: rgba(245, 166, 35, .15);
			border-color: var(--orange);
			color: var(--orange);
			font-weight: 600;
		}

		#status-banner.banner-waiting { color: var(--muted); }

		#timer-box
		{
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: .1rem;
			flex-shrink: 0;
		}

		#timer-value
		{
			font-size: 2rem;
			font-weight: 700;
			line-height: 1;
		}

		.timer-label
		{
			font-size: .65rem;
			color: inherit;
			opacity: .7;
			text-transform: uppercase;
			letter-spacing: .04em;
		}

		/* ---- Game area ---- */
		#game-area
		{
			display: flex;
			gap: 1rem;
			align-items: flex-start;
		}

		#player-panel
		{
			width: 220px;
			flex-shrink: 0;
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 14px;
			padding: .9rem;
		}

		#player-list
		{
			list-style: none;
			margin: 0;
			padding: 0;
			display: flex;
			flex-direction: column;
			gap: .4rem;
		}

		#player-list li
		{
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: .4rem;
			padding: .4rem .6rem;
			border-radius: 10px;
			background: var(--panel-2);
			border: 1px solid var(--border);
			font-size: .85rem;
		}

		#player-list li.active
		{
			background: rgba(62, 207, 142, .15);
			border-color: var(--green);
			color: var(--green);
			font-weight: 700;
		}

		.you-badge
		{
			font-size: .65rem;
			font-weight: 700;
			color: var(--accent);
			background: rgba(108, 139, 255, .2);
			padding: .1rem .4rem;
			border-radius: 999px;
		}

		.player-identity
		{
			display: flex;
			align-items: center;
			gap: .5rem;
			min-width: 0;
		}

		.player-identity span
		{
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}

		.player-avatar
		{
			width: 1.6rem;
			height: 1.6rem;
			font-size: .6rem;
			flex-shrink: 0;
		}

		.player-badges
		{
			display: flex;
			align-items: center;
			gap: .35rem;
			flex-shrink: 0;
		}

		.turn-badge
		{
			font-size: .62rem;
			font-weight: 700;
			color: var(--green);
			white-space: nowrap;
			animation: pulse 1.4s infinite;
		}

		#chat-panel { flex: 1; min-width: 0; }

		/* ---- Chat ---- */
		#feed
		{
			border: 1px solid var(--border);
			background: var(--panel);
			border-radius: 14px;
			height: 420px;
			overflow-y: auto;
			padding: .75rem;
			margin-bottom: .75rem;
			display: flex;
			flex-direction: column;
			gap: .5rem;
		}

		.msg { display: flex; gap: .6rem; align-items: flex-start; }

		.avatar
		{
			width: 2rem;
			height: 2rem;
			border-radius: 50%;
			flex-shrink: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: .7rem;
			font-weight: 700;
			color: #fff;
		}

		.msg-body
		{
			background: var(--panel-2);
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: .4rem .65rem;
			max-width: 80%;
		}

		.msg-sender { font-size: .75rem; font-weight: 700; color: var(--accent); margin-bottom: .1rem; }
		.msg-text { font-size: .9rem; line-height: 1.35; word-break: break-word; }

		.msg.system { justify-content: center; }

		.msg.system .msg-body
		{
			background: transparent;
			border: none;
			color: var(--muted);
			font-size: .78rem;
			font-style: italic;
			padding: 0;
			max-width: 100%;
			text-align: center;
		}

		#composer { display: flex; gap: .5rem; }

		#input
		{
			flex: 1;
			background: var(--panel);
			border: 1px solid var(--border);
			color: var(--text);
			border-radius: 10px;
			padding: .6rem .8rem;
			font-size: .9rem;
			transition: border-color .15s ease;
		}

		#input:focus { outline: none; }
		#input:disabled { opacity: .5; }
		#input.my-turn { border-color: var(--green); box-shadow: 0 0 0 1px var(--green); }

		#send
		{
			background: var(--accent);
			color: #fff;
			border: none;
			border-radius: 10px;
			padding: 0 1.1rem;
			font-size: .9rem;
			font-weight: 600;
			cursor: pointer;
			transition: opacity .15s ease;
		}

		#send:disabled { opacity: .4; cursor: not-allowed; }

		@keyframes pulse
		{
			0%, 100% { opacity: 1; }
			50% { opacity: .45; }
		}
	</style>
</head>
<body>
	<header>
		<div class="header-left">
			<h1>AImpostor</h1>
			<span class="tag">Salle #<span id="room-number">—</span></span>
			<span class="tag" id="round-indicator">Round -/5</span>
		</div>
		<div class="header-right">
			<span id="my-character-badge" class="tag character-badge" hidden>Tu incarnes : <strong id="my-character-name"></strong></span>
			<div id="conn" class="conn connecting">
				<span class="dot"></span>
				<span id="conn-text">connexion…</span>
			</div>
		</div>
	</header>

	<div id="status-banner" class="banner-waiting">
		<span id="status-text">Connexion au serveur…</span>
		<div id="timer-box" hidden>
			<div id="timer-value">–</div>
			<div class="timer-label" id="timer-label">secondes</div>
		</div>
	</div>

	<section id="game-area">
		<aside id="player-panel" hidden>
			<h2>Joueurs</h2>
			<ul id="player-list"></ul>
		</aside>

		<div id="chat-panel">
			<div id="feed"></div>
			<div id="composer">
				<input id="input" placeholder="connexion…" autocomplete="off" disabled>
				<button id="send" disabled>envoyer</button>
			</div>
		</div>
	</section>

	<script>
		const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
		const socket = new WebSocket(`${proto}//${location.host}/ws`);

		const feed = document.getElementById('feed');
		const input = document.getElementById('input');
		const sendBtn = document.getElementById('send');
		const conn = document.getElementById('conn');
		const connText = document.getElementById('conn-text');
		const roomNumberEl = document.getElementById('room-number');
		const roundIndicatorEl = document.getElementById('round-indicator');
		const myCharacterBadge = document.getElementById('my-character-badge');
		const myCharacterNameEl = document.getElementById('my-character-name');
		const statusBanner = document.getElementById('status-banner');
		const statusTextEl = document.getElementById('status-text');
		const timerBox = document.getElementById('timer-box');
		const timerValueEl = document.getElementById('timer-value');
		const timerLabelEl = document.getElementById('timer-label');
		const playerPanel = document.getElementById('player-panel');
		const playerListEl = document.getElementById('player-list');

		let connectionOpen = false;
		let myCharacter = null;
		let roomStatus = null;
		let roundPhase = null;
		let currentTurnCharacter = null;
		let turnOrder = [];

		function isPlayingStatus(status)
		{
			return (status ?? '').toLowerCase() === 'playing';
		}

		function isChattingPhase()
		{
			if (roundPhase === 'voting')
				return false;
			return isPlayingStatus(roomStatus);
		}

		function refreshInputState()
		{
			if (!connectionOpen)
			{
				setInput(false, 'connexion…', false);
				return;
			}

			if (!isChattingPhase())
			{
				setInput(false, 'chat désactivé', false);
				return;
			}

			if (myCharacter && currentTurnCharacter === myCharacter)
			{
				setInput(true, 'ton message…', true);
				return;
			}

			setInput(false, `au tour de ${currentTurnCharacter}…`, false);
		}

		function setInput(enabled, placeholder, myTurn)
		{
			input.disabled = !enabled;
			input.placeholder = placeholder;
			input.classList.toggle('my-turn', myTurn);
			sendBtn.disabled = !enabled || !input.value.trim();

			if (myTurn)
				input.focus();
		}

		function setConnection(state)
		{
			conn.className = `conn ${state}`;
			connText.textContent = {
				connecting: 'connexion…',
				open: 'connecté',
				closed: 'déconnecté',
			}[state] || state;
			connectionOpen = state === 'open';
			refreshInputState();
		}

		function setBanner(text, variant)
		{
			statusTextEl.textContent = text;
			statusBanner.className = variant ? `banner-${variant}` : '';
		}

		function showTimer(seconds, label)
		{
			timerBox.hidden = false;
			timerValueEl.textContent = seconds;
			timerLabelEl.textContent = label;
		}

		function hideTimer()
		{
			timerBox.hidden = true;
		}

		function updateBanner()
		{
			if (!connectionOpen)
			{
				setBanner('Connexion au serveur…', 'waiting');
				hideTimer();
				return;
			}

			if (myCharacter && currentTurnCharacter === myCharacter && isChattingPhase())
			{
				setBanner('À TOI DE JOUER', 'myturn');
				return;
			}

			if (roundPhase === 'voting')
			{
				setBanner('Phase de vote', 'voting');
				hideTimer();
				return;
			}

			if (isPlayingStatus(roomStatus))
			{
				setBanner(currentTurnCharacter ? `Au tour de ${currentTurnCharacter}` : 'Partie en cours', 'info');
				return;
			}

			setBanner('En attente de joueurs…', 'waiting');
		}

		function updateRoundIndicator(turnCycle)
		{
			if (turnCycle === null || turnCycle === undefined)
			{
				roundIndicatorEl.textContent = 'Round -/5';
				return;
			}

			const round = 5 - turnCycle + 1;
			roundIndicatorEl.textContent = `Round ${round}/5`;
		}

		function renderPlayerList()
		{
			if (turnOrder.length === 0)
			{
				playerPanel.hidden = true;
				return;
			}

			playerPanel.hidden = false;
			playerListEl.innerHTML = '';

			for (const character of turnOrder)
			{
				const isActive = currentTurnCharacter !== null && character === currentTurnCharacter;
				const isMe = myCharacter !== null && character === myCharacter;

				const li = document.createElement('li');
				li.className = isActive ? 'active' : '';

				const identity = document.createElement('div');
				identity.className = 'player-identity';

				const avatar = document.createElement('div');
				avatar.className = 'avatar player-avatar';
				avatar.style.background = colorFor(character);
				avatar.textContent = initialsFor(character);
				identity.appendChild(avatar);

				const nameSpan = document.createElement('span');
				nameSpan.textContent = character;
				identity.appendChild(nameSpan);

				li.appendChild(identity);

				const badges = document.createElement('div');
				badges.className = 'player-badges';

				if (isActive)
				{
					const turnBadge = document.createElement('span');
					turnBadge.className = 'turn-badge';
					turnBadge.textContent = '● en train de jouer';
					badges.appendChild(turnBadge);
				}

				if (isMe)
				{
					const badge = document.createElement('span');
					badge.className = 'you-badge';
					badge.textContent = 'toi';
					badges.appendChild(badge);
				}

				li.appendChild(badges);
				playerListEl.appendChild(li);
			}
		}

		function colorFor(sender)
		{
			let hash = 0;
			for (let i = 0; i < sender.length; i++)
				hash = sender.charCodeAt(i) + ((hash << 5) - hash);
			return `hsl(${hash % 360}, 65%, 55%)`;
		}

		function initialsFor(sender)
		{
			const parts = sender.split(/[\s-]+/).filter(Boolean);
			if (parts.length >= 2)
				return (parts[0][0] + parts[1][0]).toUpperCase();
			return sender.slice(0, 2).toUpperCase();
		}

		function appendChatMessage(sender, text)
		{
			const div = document.createElement('div');
			div.className = 'msg';

			const avatar = document.createElement('div');
			avatar.className = 'avatar';
			avatar.style.background = colorFor(sender);
			avatar.textContent = initialsFor(sender);

			const body = document.createElement('div');
			body.className = 'msg-body';

			const senderEl = document.createElement('div');
			senderEl.className = 'msg-sender';
			senderEl.textContent = sender;

			const textEl = document.createElement('div');
			textEl.className = 'msg-text';
			textEl.textContent = text;

			body.appendChild(senderEl);
			body.appendChild(textEl);
			div.appendChild(avatar);
			div.appendChild(body);
			feed.appendChild(div);
			feed.scrollTop = feed.scrollHeight;
		}

		function appendSystemLine(text)
		{
			const div = document.createElement('div');
			div.className = 'msg system';
			const body = document.createElement('div');
			body.className = 'msg-body';
			body.textContent = text;
			div.appendChild(body);
			feed.appendChild(div);
			feed.scrollTop = feed.scrollHeight;
		}

		function handleState(msg)
		{
			roomNumberEl.textContent = msg.room_number;
			roomStatus = msg.status;

			if (!isPlayingStatus(roomStatus))
			{
				currentTurnCharacter = null;
				turnOrder = [];
				renderPlayerList();
				showCountdownOrHide(msg.countdown);
			}

			updateBanner();
			refreshInputState();
		}

		function showCountdownOrHide(countdown)
		{
			if (countdown === null || countdown === undefined)
			{
				hideTimer();
				return;
			}
			showTimer(countdown, 'avant le début');
		}

		function handleAssignment(msg)
		{
			myCharacter = msg.character;
			myCharacterBadge.hidden = false;
			myCharacterNameEl.textContent = myCharacter;
			appendSystemLine(`>>> nouvelle manche, tu incarnes ${myCharacter}`);
			renderPlayerList();
			refreshInputState();
		}

		function handleYourTurn(msg)
		{
			currentTurnCharacter = myCharacter;
			roundPhase = 'chatting';
			updateBanner();
			showTimer(msg.countdown, 'secondes');
			refreshInputState();
		}

		function handleTurn(msg)
		{
			currentTurnCharacter = msg.character;
			turnOrder = msg.turnOrder;
			roundPhase = 'chatting';
			updateRoundIndicator(msg.turnCycle);
			renderPlayerList();
			updateBanner();
			showTimer(msg.countdown, 'secondes');
			refreshInputState();
		}

		function handleChat(msg)
		{
			appendChatMessage(msg.sender, msg.text);
		}

		function handleRoundState(msg)
		{
			roundPhase = msg.status;
			updateBanner();
			refreshInputState();
		}

		function route(msg)
		{
			switch (msg.type)
			{
				case 'state':
					handleState(msg);
					break;
				case 'assignment':
					handleAssignment(msg);
					break;
				case 'yourTurn':
					handleYourTurn(msg);
					break;
				case 'turn':
					handleTurn(msg);
					break;
				case 'chat':
					handleChat(msg);
					break;
				case 'roundState':
					handleRoundState(msg);
					break;
				case 'silence':
					appendSystemLine(`${msg.character} est resté muet ce tour...`);
					break;
			}
		}

		socket.onopen = () => { setConnection('open'); appendSystemLine('connecté'); };
		socket.onclose = () => { setConnection('closed'); appendSystemLine('déconnecté'); };
		socket.onerror = () => setConnection('closed');
		socket.onmessage = (event) => route(JSON.parse(event.data));

		function envoyer()
		{
			const text = input.value.trim();
			if (!text)
				return;
			socket.send(JSON.stringify({ type: 'chat', text }));
			input.value = '';
			sendBtn.disabled = true;
		}

		sendBtn.addEventListener('click', envoyer);
		input.addEventListener('keydown', (e) => { if (e.key === 'Enter') envoyer(); });
		input.addEventListener('input', () => { sendBtn.disabled = input.disabled || !input.value.trim(); });
	</script>
</body>
</html>
